<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8"/>
    <title>Log ind – Wish2Gather</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap"/>
    <link rel="stylesheet" th:href="@{/styles.css}"/>
</head>
<body>
<div class="auth-page">
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="auth-wrapper">
        <div class="auth-box">
            <p class="auth-eyebrow">Har du ikke en konto? <a th:href="@{/profile/create}">Opret konto</a></p>
            <h1>Log ind</h1>

            <div class="error-banner" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <form th:action="@{/login}" method="post">
                <div class="field">
                    <label for="email">Email</label>
                    <input id="email" type="email" name="email" placeholder="din@email.dk" autocomplete="email"/>
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <div class="password-wrap">
                        <input id="password" type="password" name="password" placeholder="••••••••" autocomplete="current-password"/>
                        <button type="button" class="toggle-password" onclick="togglePw('password', this)" aria-label="Vis adgangskode">
                            <svg id="eye-password" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-primary btn-full">Log ind</button>
            </form>
        </div>
    </div>

    <footer>
        <div th:replace="~{fragments :: footer}"></div>
    </footer>
</div>
<script>
    function togglePw(fieldId, btn) {
        const input = document.getElementById(fieldId);
        input.type = input.type === 'password' ? 'text' : 'password';
    }
</script>
</body>
</html>
