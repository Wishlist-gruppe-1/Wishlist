<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">

<body>

<!-- NAVBAR FRAGMENT -->
<nav th:fragment="navbar">

            <circle cx="18" cy="18" r="18" fill="#1e4f6b"/>

    <button class="nav-search" aria-label="Søg">

            <circle cx="11" cy="11" r="8"/>
            <path d="M21 21l-4.35-4.35"/>
        </svg>

</nav>
