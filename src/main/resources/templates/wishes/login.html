<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Log ind</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container">
    <h1>Log ind</h1>

    <div class="error-box" th:if="${errorMessage}">
        <p th:text="${errorMessage}"></p>
    </div>

    <form th:action="@{/profil/login}" method="post">
        <div class="field">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>

        <div class="field">
            <label>Adgangskode</label>
            <input type="password" name="password" required>
        </div>

        <div class="actions">
            <button type="submit">Log ind</button>
            <a th:href="@{/profil/create}" class="button">Opret profil</a>
        </div>
    </form>
</div>
</body>
</html>
