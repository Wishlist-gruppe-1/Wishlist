<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
  <meta charset="UTF-8"/>
  <title>Profiler – Wish2Gather</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap"/>
  <link rel="stylesheet" th:href="@{/styles.css}"/>
  <style>
    body { background: #f7f4f0; margin: 0; }
    .page-wrapper { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 2.5rem 0 2rem;
    }
    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      color: #1e4f6b;
      margin: 0;
    }
    .btn-primary {
      padding: 0.7rem 1.4rem;
      background: #e05a2b;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #c44e22; }
    .profile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }
    .profile-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(30,79,107,0.07);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .profile-card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: #1e4f6b;
      font-weight: 700;
    }
    .profile-card-email {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: #7a8a96;
    }
    .profile-card-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: auto;
    }
    .btn-small {
      padding: 0.45rem 0.9rem;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-small-primary {
      background: #1e4f6b;
      color: #fff;
      border: none;
    }
    .btn-small-primary:hover { background: #163d54; }
    .btn-small-outline {
      background: transparent;
      color: #1e4f6b;
      border: 1.5px solid #1e4f6b;
    }
    .btn-small-outline:hover { background: #f0f5f8; }
    .btn-small-danger {
      background: transparent;
      color: #e05a2b;
      border: 1.5px solid #e05a2b;
    }
    .btn-small-danger:hover { background: #fff0eb; }
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      font-family: 'DM Sans', sans-serif;
      color: #7a8a96;
    }
    .empty-state h2 {
      font-family: 'Playfair Display', serif;
      color: #1e4f6b;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>

<div class="page-wrapper">
  <div class="page-header">
    <h1>Profiler</h1>
    <a th:href="@{/profile/create}" class="btn-primary">+ Opret profil</a>
  </div>

  <div th:if="${#lists.isEmpty(profiles)}" class="empty-state">
    <h2>Ingen profiler endnu</h2>
    <p>Opret din første profil for at komme i gang.</p>
  </div>

  <div class="profile-grid" th:unless="${#lists.isEmpty(profiles)}">
    <div class="profile-card" th:each="profile : ${profiles}">
      <div>
        <div class="profile-card-name" th:text="${profile.name}">Navn</div>
        <div class="profile-card-email" th:text="${profile.email}">email@example.com</div>
      </div>
      <div class="profile-card-actions">
        <a th:href="@{/profile/list}" class="btn-small btn-small-primary">Mine lister</a>
        <a th:href="@{/profile/{id}/edit(id=${profile.profileId})}" class="btn-small btn-small-outline">Rediger</a>
        <form th:action="@{/profile/{id}/delete(id=${profile.profileId})}" method="post" style="margin:0">
          <button type="submit" class="btn-small btn-small-danger"
                  onclick="return confirm('Er du sikker?')">Slet</button>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>
