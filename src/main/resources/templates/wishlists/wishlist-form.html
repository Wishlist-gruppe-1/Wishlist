<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${formTitle}">Liste formular</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap"/>
    <link rel="stylesheet" th:href="@{/styles.css}"/>
    </head>
<body>
<div class="form-page">
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="form-wrapper">
        <h1 th:text="${formTitle}">Opret liste</h1>

        <div class="error-banner" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <form th:action="${formAction}" th:object="${wishlist}" method="post">
            <div class="field">
                <label for="title">Titel <span style="color:var(--orange)">*</span></label>
                <input id="title" type="text" th:field="*{title}" maxlength="50" placeholder="Indtast venligst"/>
            </div>

            <div class="field">
                <label for="description">Beskrivelse</label>
                <textarea id="description" th:field="*{description}" maxlength="500" placeholder="Skriv venligst"></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary" th:text="${submitLabel}">Gem</button>
                <a th:href="@{/profile/list}" class="btn-secondary">Afbryd</a>
            </div>
        </form>
    </div>

    <footer>
        <div th:replace="~{fragments :: footer}"></div>
    </footer>
</div>
</body>
</html>
